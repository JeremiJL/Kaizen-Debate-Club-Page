<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Kaizen Debate Club</title>
  <link rel="icon" type="image/x-icon" href="images/icons/kaizendebateclub.ico">
  <!-- Bootstrap CSS and JS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!--  Override with custom CSS -->
  <style>
    :root{

      --bg: #0b0c0f;
      --ink: rgba(255,255,255,.92);
      --ink-2: rgba(255,255,255,.82);
      --muted: rgba(255,255,255,.66);

      --glass: rgba(255,255,255,.06);
      --glass-2: rgba(255,255,255,.085);
      --glass-3: rgba(255,255,255,.11);

      --hairline: rgba(255,255,255,.12);
      --hairline-2: rgba(255,255,255,.18);

      --shadow-1: 0 12px 34px rgba(0,0,0,.35);
      --shadow-2: 0 18px 60px rgba(0,0,0,.55);

      --radius: 20px;
      --radius-sm: 14px;

      --blur: 16px;

      --ease: cubic-bezier(.2,.8,.2,1);
      --t1: 140ms;
      --t2: 240ms;
      --t3: 520ms;

      --maxw: 1100px;
      --pad: clamp(18px, 3.6vw, 44px);

      --h1: clamp(34px, 3.1vw, 54px);
      --h2: clamp(22px, 1.8vw, 30px);
      --p: clamp(15px, 0.7vw + 12px, 18px);

      --icon-size: clamp(44px, 1.2vw + 16px, 30px);
    }

    *{ box-sizing: border-box; }
    html{ scroll-behavior: smooth; }
    body{
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: "Montserrat", system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    img{ max-width: 100%; height: auto; display: block; }
    a{ color: inherit; text-decoration: none; }
    a:hover{ color: rgba(255,255,255,.96); }

    :focus-visible{
      outline: 3px solid rgba(220,53,69,.38);
      outline-offset: 3px;
      border-radius: 12px;
    }

    footer, h1, h2, header{
      font-family: "Koulen", system-ui, sans-serif;
      letter-spacing: .07em;
    }

    main.site-main{
      width: min(var(--maxw), calc(100% - (2 * var(--pad))));
      margin: 92px auto 96px;
      font-size: var(--p);
      line-height: 1.65;
    }

    .container-flex{
      width: 100%;
      max-width: var(--maxw);
      margin-inline: auto;
    }

    h1{
      font-size: var(--h1);
      line-height: 1.02;
      margin: 0 0 22px 0;
      color: var(--brand);
      text-shadow: 0 10px 28px rgba(220,53,69,.16);
    }
    h2{
      font-size: var(--h2);
      line-height: 1.15;
      margin: 0 0 14px 0;
      color: rgba(255,255,255,.94);
    }
    p{
      margin: 0 0 16px 0;
      color: var(--ink-2);
    }

    hr{
      border: 0;
      height: 1px;
      background: rgba(255,255,255,.12);
      margin: 18px 0 0;
    }


    .container, .container-sm, .container-md, .container-lg, .container-xl, .container-xxl{
      max-width: var(--maxw);
    }

    .btn{
      border-radius: 999px !important;
      padding: 10px 16px !important;
      border: 1px solid var(--hairline) !important;
      background: rgba(255,255,255,.06) !important;
      color: rgba(255,255,255,.90) !important;
      box-shadow: none !important;
      transition: transform var(--t2) var(--ease), background var(--t2) var(--ease), border-color var(--t2) var(--ease);
    }
    .btn:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.10) !important;
      border-color: rgba(220,53,69,.28) !important;
    }
    .btn:active{ transform: translateY(0); }
    .btn-primary, .btn-danger, .btn-outline-primary, .btn-outline-danger{
      background: rgba(255,255,255,.06) !important;
    }

    .form-control, .form-select{
      border-radius: 14px !important;
      background: rgba(255,255,255,.06) !important;
      border: 1px solid var(--hairline) !important;
      color: rgba(255,255,255,.92) !important;
      box-shadow: none !important;
    }
    .form-control::placeholder{ color: rgba(255,255,255,.44); }
    .form-control:focus, .form-select:focus{
      border-color: rgba(220,53,69,.35) !important;
      outline: none !important;
      box-shadow: 0 0 0 4px rgba(220,53,69,.12) !important;
    }

    .site-nav{
      position: sticky;
      top: 0;
      z-index: 1000;

      background: rgba(10,11,14,.55);
      border-bottom: 1px solid var(--hairline);
      box-shadow: 0 12px 34px rgba(0,0,0,.25);

      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
    }

    .site-nav .navbar-nav{ gap: 6px; }

    .site-nav .nav-link{
      position: relative;
      padding: 12px 14px !important;
      border-radius: 999px;
      letter-spacing: .06em;
      color: rgba(255,255,255,.78) !important;

      transition:
              transform var(--t1) var(--ease),
              background var(--t2) var(--ease),
              color var(--t2) var(--ease);
    }

    .site-nav .nav-link:hover{
      background: rgba(255,255,255,.07);
      color: rgba(255,255,255,.96) !important;
      transform: translateY(-1px);
    }

    .site-nav .nav-link::after{
      content:"";
      position:absolute;
      left: 14px;
      right: 14px;
      bottom: 8px;
      height: 2px;
      border-radius: 2px;
      background: var(--brand);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform var(--t2) var(--ease);
      opacity: .9;
    }
    .site-nav .nav-link:hover::after{ transform: scaleX(1); }

    @media (max-width: 800px){

      .site-nav .navbar-collapse{
        padding: 0;
        border: 0;
        will-change: height;
      }

      .site-nav .navbar-collapse.collapsing,
      .site-nav .navbar-collapse.show{
        margin-top: 10px;
      }

      .site-nav .navbar-nav{
        padding: 10px 0 6px;
        margin: 0;
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .site-nav .nav-link{
        width: 100%;
        border-radius: 16px;
        padding: 14px 16px !important;
        margin: 0 !important;
        transform: none;
      }

      .site-nav .nav-link:hover{
        transform: none;
      }

      .site-nav .nav-link::after{
        display: none;
      }
    }


    .homeBackGroundVideo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .hero{
      position: relative;
      padding: clamp(18px, 3vw, 34px);
      border-radius: var(--radius);
      background: rgba(255,255,255,.06);
      border: 1px solid var(--hairline);
      box-shadow: var(--shadow-1);

      backdrop-filter: blur(calc(var(--blur) + 2px));
      -webkit-backdrop-filter: blur(calc(var(--blur) + 2px));

      overflow: hidden;
      transform: translateZ(0);
    }

    .hero::before{
      content:"";
      position:absolute;
      inset: -2px;
      pointer-events:none;
      background:
              radial-gradient(700px 260px at 20% 0%, rgba(220,53,69,.12), transparent 60%),
              radial-gradient(500px 220px at 85% 10%, rgba(255,255,255,.08), transparent 62%);
      opacity: .9;
    }

    .hero > *{ position: relative; }

    .hero.hero--video{
      position: relative;
    }

    .homeBackGroundVideo{
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .hero__overlay{
      position: absolute;
      inset: 0;
      z-index: 1;
      background: rgba(10,11,14,.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .hero__content{
      position: relative;
      z-index: 2;
    }

    .hero--video .blockquote-footer{
      color: rgba(255,255,255,.78);
    }

    figure.text-center{ margin: 0 0 34px 0; }

    .blockquote-footer{
      margin-top: 8px;
      color: var(--muted);
      font-size: clamp(12px, 0.5vw + 10px, 14px);
      letter-spacing: .02em;
    }


    .content-block{
      margin: 20px 0 20px;
      padding: clamp(18px, 2.4vw, 26px);
      border-radius: var(--radius);

      background: rgba(255,255,255,.06);
      border: 1px solid var(--hairline);
      box-shadow: var(--shadow-1);

      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));

      transition: transform var(--t2) var(--ease), box-shadow var(--t2) var(--ease), border-color var(--t2) var(--ease), background var(--t2) var(--ease);
    }
    .content-block:hover{
      background: rgba(255,255,255,.075);
    }

    .content-block > h2{
      margin-bottom: 14px;
    }

    .side-note{
      margin: 0 0 10px 0;
      color: var(--muted);
      text-align: center;
      font-size: clamp(12px, 0.55vw + 10px, 14px);
    }

    .highlighted-quote{
      margin: 18px 0 14px;
      padding: clamp(14px, 2.2vw, 22px);
      border-radius: var(--radius);

      background: rgba(255,255,255,.08);
      border: 1px solid rgba(220,53,69,.26);

      font-style: italic;
      text-align: center;
      color: rgba(255,255,255,.90);

      box-shadow: 0 12px 34px rgba(0,0,0,.35);

      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
    }


    .row.container-flex{
      margin: 0 0 10px 0;
      padding: 14px 14px;
      border-radius: var(--radius-sm);

      background: var(--brand-lighter);
      border: 1px solid var(--hairline);
      box-shadow: 0 12px 30px rgba(0,0,0,.25);

      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));

      transition: transform var(--t2) var(--ease), box-shadow var(--t2) var(--ease), border-color var(--t2) var(--ease), background var(--t2) var(--ease);
    }
    .row.container-flex:hover{
      background: rgba(255,255,255,.075);
      border-color: var(--muted);
      box-shadow: 0 18px 44px rgba(0,0,0,.45);
    }

    .title-column p{
      margin: 0;
      color: rgba(255,255,255,.86);
      font-weight: 700;
    }


    .card{
      border-radius: var(--radius) !important;
      border: 1px solid var(--hairline) !important;
      background: rgba(255,255,255,.06) !important;
      box-shadow: var(--shadow-1) !important;

      overflow: hidden;
      transform: translateZ(0);

      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));

      transition: transform var(--t2) var(--ease), box-shadow var(--t2) var(--ease), border-color var(--t2) var(--ease), background var(--t2) var(--ease);
    }

    .card:hover{
      transform: translateY(-7px);
      background: rgba(255,255,255,.075) !important;
      box-shadow: var(--shadow-2) !important;
      border-color: rgba(220,53,69,.30) !important;
    }

    .card-img-top{
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;

      filter: saturate(1.02) contrast(1.02);
      transform: scale(1);
      transition: transform var(--t3) var(--ease);
    }
    .card:hover .card-img-top{ transform: scale(1.04); }

    .card-body{ padding: 18px 18px 22px !important; }

    .card-title{
      font-size: clamp(18px, .8vw + 16px, 22px);
      margin-bottom: 10px;
      color: rgba(255,255,255,.94);
    }

    .card-text ul{
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .card-text li{
      color: var(--muted);
      font-size: clamp(13px, .5vw + 12px, 15px);
    }


    .pager{
      display: grid;
      grid-template-columns: 52px 1fr 52px;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .pager__arrow{
      width: 52px;
      height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;

      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(10,11,14,.55);
      color: rgba(255,255,255,.90);

      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));

      box-shadow: 0 10px 26px rgba(0,0,0,.35);
      transition: transform var(--t2) var(--ease), border-color var(--t2) var(--ease), background var(--t2) var(--ease);
      cursor: pointer;
    }

    .pager__arrow:hover{
      transform: translateY(-2px);
      border-color: rgba(220,53,69,.30);
      background: rgba(255,255,255,.07);
    }

    .pager__arrow:active{ transform: translateY(0); }

    .pager__arrow:disabled{
      opacity: .45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .pagination.pager__strip{
      display: flex;
      align-items: center;
      gap: 10px;

      margin: 0;
      padding: 6px 2px;

      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;

      scrollbar-width: none;
    }
    .pagination.pager__strip::-webkit-scrollbar{ display: none; }

    .pagination.pager__strip .page-item{
      flex: 0 0 auto;
    }

    .pagination.pager__strip .page-link{
      align-items: center;
      justify-content: center;

      min-height: 50px;
      padding: 12px 16px;

      width: clamp(120px, 14vw, 190px);
      max-width: 190px;

      white-space: normal;
      text-align: center;
      line-height: 1.15;

      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;

      border-radius: 999px !important;
      border: 1px solid var(--hairline) !important;
      background: rgba(255,255,255,.06) !important;
      color: rgba(255,255,255,.86) !important;

      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));

      transition:
              transform var(--t2) var(--ease),
              box-shadow var(--t2) var(--ease),
              border-color var(--t2) var(--ease),
              background var(--t2) var(--ease);

      cursor: pointer;
    }

    .pagination.pager__strip .page-link:hover{
      transform: translateY(-2px);
      background: rgba(255,255,255,.075) !important;
      border-color: rgba(220,53,69,.30) !important;
      box-shadow: 0 18px 44px rgba(0,0,0,.45);
    }

    .pagination.pager__strip .page-link.is-active{
      border-color: rgba(220,53,69,.38) !important;
      background: rgba(255,255,255,.085) !important;
      box-shadow: 0 0 0 4px rgba(220,53,69,.12) !important;
    }

    @media (max-width: 560px){
      .pager{
        grid-template-columns: 46px 1fr 46px;
        gap: 10px;
      }

      .pager__arrow{
        width: 46px;
        height: 46px;
      }

      .pagination.pager__strip .page-link{
        width: clamp(108px, 36vw, 168px);
        max-width: 168px;
        min-height: 48px;
        padding: 10px 14px;
      }
    }


    .site-footer{
      margin-top: 48px;
      padding: 18px 0;
      color: rgba(255,255,255,.92);

      background: rgba(10,11,14,.78);
      border-top: 1px solid rgba(255,255,255,.10);

      backdrop-filter: blur(calc(var(--blur) + 2px));
      -webkit-backdrop-filter: blur(calc(var(--blur) + 2px));
    }

    .site-footer .nav-link{
      color: rgba(255,255,255,.82) !important;
      padding: 10px 12px;
      border-radius: 999px;
      transition: background var(--t2) var(--ease), transform var(--t1) var(--ease), color var(--t2) var(--ease);
    }
    .site-footer .nav-link:hover{
      background: rgba(255,255,255,.07);
      transform: translateY(-1px);
      color: rgba(255,255,255,.96) !important;
    }

    .site-footer .text-danger{ color: var(--brand) !important; }

    .socials-block{
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 12px;
      text-align: center;
    }

    .socials-title{
      margin: 0;
      color: rgba(255,255,255,.82);
      letter-spacing: .02em;
      font-family: "Montserrat", system-ui, sans-serif;
      font-size: clamp(14px, 0.55vw + 12px, 16px);
    }

    .social-columns{
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: max-content;
      gap: 14px;
      align-items: center;
      justify-content: center;
    }

    .icon{
      display: inline-flex;
      align-items: center;
      justify-content: center;

      border-radius: 14px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);

      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);

      transition: transform 240ms cubic-bezier(.2,.8,.2,1),
      background 240ms cubic-bezier(.2,.8,.2,1),
      border-color 240ms cubic-bezier(.2,.8,.2,1);
    }

    .icon:hover{
      transform: translateY(-2px);
      background: rgba(255,255,255,.085);
      border-color: rgba(220,53,69,.28);
    }

    .icon:active{
      transform: translateY(0);
    }

    .icon img,
    .icon svg{
      width: 22px;
      height: 22px;
      display: block;
    }

    @media (max-width: 520px){
      .social-columns{
        grid-auto-flow: row;
        grid-template-columns: repeat(3, max-content);
        justify-content: center;
      }
    }


    #pjait_logo{
      filter: drop-shadow(0 14px 26px rgba(0,0,0,.35));
    }


    @media (max-width: 800px){
      main.site-main{
        width: calc(100% - 28px);
        margin: 86px auto 86px;
      }
      .hero{ padding: 18px; }
    }


    @media (prefers-reduced-motion: reduce){
      *{ transition: none !important; scroll-behavior: auto !important; }
    }
  </style>


  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Koulen&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>

<body>
<noscript>You need to enable JavaScript to run this app.</noscript>
<div id="root"></div>
</body>
</html>
